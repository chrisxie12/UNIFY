<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Holy Child College - Catholic girls' school, Takoradi. Blue & gold, cross + child figure -->
  <rect width="64" height="64" rx="8" fill="#003B6F"/>
  <!-- White shield -->
  <path d="M10 8 L54 8 L54 40 Q54 56 32 60 Q10 56 10 40 Z" fill="#E8F4FF" stroke="#003B6F" stroke-width="1"/>
  <!-- Latin cross -->
  <rect x="29.5" y="12" width="5" height="28" rx="1.5" fill="#003B6F"/>
  <rect x="17" y="20" width="30" height="5" rx="1.5" fill="#003B6F"/>
  <!-- Gold halo circle at top of cross -->
  <circle cx="32" cy="14" r="5" fill="none" stroke="#FFD700" stroke-width="2.5"/>
  <!-- Child figure (simple silhouette) below cross arms -->
  <circle cx="32" cy="33" r="3" fill="#003B6F"/>
  <!-- School name -->
  <text x="32" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" font-weight="800" fill="#FFD700">HOLY CHILD</text>
</svg>
