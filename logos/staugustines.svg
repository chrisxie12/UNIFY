<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- St. Augustine's College - Anglican school, Cape Coast. Purple/maroon & gold, bishop's mitre -->
  <rect width="64" height="64" rx="8" fill="#4A235A"/>
  <!-- Gold shield -->
  <path d="M10 8 L54 8 L54 40 Q54 56 32 60 Q10 56 10 40 Z" fill="#fff" stroke="#4A235A" stroke-width="1"/>
  <!-- Bishop's mitre (St Augustine was a bishop) -->
  <path d="M20 32 L26 14 L32 22 L38 14 L44 32 Z" fill="#4A235A"/>
  <rect x="19" y="32" width="26" height="5" rx="2" fill="#4A235A"/>
  <!-- Band on mitre -->
  <path d="M20 28 L44 28" stroke="#FFD700" stroke-width="2"/>
  <!-- Cross on mitre -->
  <line x1="32" y1="16" x2="32" y2="26" stroke="#FFD700" stroke-width="1.5"/>
  <line x1="27" y1="20" x2="37" y2="20" stroke="#FFD700" stroke-width="1.5"/>
  <!-- School name -->
  <text x="32" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="4.8" font-weight="800" fill="#FFD700">ST. AUGUSTINE'S</text>
</svg>
