name: unify
description: Campus identity and announcement platform for Ghanaian universities
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Backend ────────────────────────────────────────────────
  supabase_flutter: ^2.8.4

  # ── State Management ───────────────────────────────────────
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # ── Navigation ─────────────────────────────────────────────
  go_router: ^14.8.1

  # ── Local Storage / Caching ────────────────────────────────
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.4
  connectivity_plus: ^6.1.4

  # ── Network & Media ────────────────────────────────────────
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # ── UI ─────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0

  # ── Utilities ──────────────────────────────────────────────
  flutter_dotenv: ^5.2.1
  intl: ^0.19.0
  timeago: ^3.7.0
  uuid: ^4.5.1
  equatable: ^2.0.7
  file_picker: ^8.1.6

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.2
  custom_lint: ^0.7.5
  riverpod_lint: ^2.4.5

flutter:
  uses-material-design: true
  assets:
    - assets/.env
