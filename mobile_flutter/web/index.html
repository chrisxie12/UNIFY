<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="UNIFY — your campus, connected.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="unify">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>unify</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #ffffff; }
    #boot-status {
      position: fixed; inset: 0; z-index: 99999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: -apple-system, Roboto, Arial, sans-serif;
      color: #1d4ed8; padding: 24px; box-sizing: border-box; text-align: center;
    }
    #boot-status .label { font-size: 16px; font-weight: 600; }
    #boot-status .detail {
      margin-top: 12px; font-size: 12px; color: #b91c1c; white-space: pre-wrap;
      word-break: break-word; max-width: 100%; max-height: 60vh; overflow: auto;
      text-align: left; font-family: monospace;
    }
  </style>
</head>
<body>
  <!-- Plain-HTML boot overlay. Renders even if Flutter/CanvasKit never starts,
       so a blank white screen always shows a readable status instead. Flutter
       removes #boot-status automatically once the app paints its first frame. -->
  <div id="boot-status">
    <div class="label">Loading UNIFY…</div>
    <div class="detail" id="boot-detail"></div>
  </div>

  <script>
    (function () {
      var detail = document.getElementById('boot-detail');
      var label = document.querySelector('#boot-status .label');
      function show(msg) {
        if (!detail) return;
        detail.textContent += msg + '\n';
        if (label) label.textContent = 'UNIFY failed to start';
      }
      window.addEventListener('error', function (e) {
        show('JS error: ' + (e.message || e.error || e) +
             (e.filename ? '\n  at ' + e.filename + ':' + e.lineno : ''));
      });
      window.addEventListener('unhandledrejection', function (e) {
        show('Promise rejected: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
      });
      // If Flutter hasn't removed this overlay after 20s, report it's stuck.
      setTimeout(function () {
        var el = document.getElementById('boot-status');
        if (el && label && label.textContent.indexOf('Loading') === 0) {
          show('Still loading after 20s — Flutter engine did not paint. ' +
               'CanvasKit/main.dart.js likely failed to load (check the asset requests).');
        }
      }, 20000);
    })();
  </script>

  <script src="https://github.com/corbado/flutter-passkeys/releases/download/2.4.0/bundle.js"></script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
