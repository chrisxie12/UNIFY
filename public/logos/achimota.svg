<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Achimota School - piano keys (iconic symbol of racial harmony) + green/white -->
  <rect width="64" height="64" rx="8" fill="#006B3C"/>
  <!-- White shield background -->
  <path d="M10 8 L54 8 L54 42 Q54 56 32 60 Q10 56 10 42 Z" fill="#fff"/>
  <!-- Piano keys in shield - Achimota's iconic symbol -->
  <rect x="14" y="18" width="5" height="18" rx="1" fill="#fff" stroke="#222" stroke-width="0.5"/>
  <rect x="20" y="18" width="5" height="18" rx="1" fill="#222"/>
  <rect x="26" y="18" width="5" height="18" rx="1" fill="#fff" stroke="#222" stroke-width="0.5"/>
  <rect x="32" y="18" width="5" height="18" rx="1" fill="#222"/>
  <rect x="38" y="18" width="5" height="18" rx="1" fill="#fff" stroke="#222" stroke-width="0.5"/>
  <rect x="44" y="18" width="5" height="18" rx="1" fill="#222"/>
  <!-- School name -->
  <text x="32" y="50" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="800" fill="#006B3C">ACHIMOTA</text>
  <text x="32" y="13" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" font-weight="700" fill="#fff">EST. 1924</text>
</svg>
