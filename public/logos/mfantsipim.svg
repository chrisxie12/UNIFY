  <rect x="16" y="16" width="5" height="8" rx="1" fill="#FFD700"/>
  <rect x="24" y="16" width="5" height="8" rx="1" fill="#FFD700"/>
  <rect x="32" y="16" width="5" height="8" rx="1" fill="#FFD700"/>
  <rect x="40" y="16" width="5" height="8" rx="1" fill="#FFD700"/>
  <!-- Door -->
  <path d="M28 36 L28 30 Q32 27 36 30 L36 36 Z" fill="#003B6F"/>
