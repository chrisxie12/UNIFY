<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Opoku Ware School (OWASS) - Catholic school, Kumasi. Green, gold & black, crown + Ashanti kente -->
  <rect width="64" height="64" rx="8" fill="#1E5E1E"/>
  <!-- Shield -->
  <path d="M10 8 L54 8 L54 40 Q54 56 32 60 Q10 56 10 40 Z" fill="#fff" stroke="#1E5E1E" stroke-width="1"/>
  <!-- Crown at top (Opoku Ware was an Ashanti king) -->
  <path d="M17 22 L17 30 L47 30 L47 22 L43 26 L38 20 L32 27 L26 20 L21 26 Z" fill="#FFD700"/>
  <!-- Kente-inspired horizontal stripes in lower shield -->
  <rect x="14" y="31" width="36" height="4" rx="0" fill="#006400"/>
  <rect x="14" y="35" width="36" height="3" rx="0" fill="#FFD700"/>
  <rect x="14" y="38" width="36" height="3" rx="0" fill="#CC0000"/>
  <!-- School name -->
  <text x="32" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" font-weight="800" fill="#FFD700">OPOKU WARE</text>
</svg>
