<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- PRESEC - Presbyterian Boys' SHS. Blue shield, burning torch, Presbyterian cross, gold motto -->
  <rect width="64" height="64" rx="8" fill="#003B6F"/>
  <!-- Shield shape -->
  <path d="M10 8 L54 8 L54 40 Q54 56 32 60 Q10 56 10 40 Z" fill="#00529B"/>
  <!-- Presbyterian cross (St. Andrew cross / X shape) -->
  <line x1="16" y1="14" x2="48" y2="46" stroke="#fff" stroke-width="3.5"/>
  <line x1="48" y1="14" x2="16" y2="46" stroke="#fff" stroke-width="3.5"/>
  <!-- Center circle with torch flame -->
  <circle cx="32" cy="30" r="9" fill="#003B6F"/>
  <!-- Torch flame -->
  <ellipse cx="32" cy="24" rx="4" ry="6" fill="#FCD116"/>
  <ellipse cx="32" cy="26" rx="2.5" ry="4" fill="#FF6B00"/>
  <!-- Torch handle -->
  <rect x="30.5" y="30" width="3" height="8" rx="1" fill="#FCD116"/>
  <!-- School name -->
  <text x="32" y="57" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="800" fill="#FCD116">PRESEC</text>
</svg>
