workflows:
  testflight-release:
    name: UNIFY TestFlight Release
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: mobile_flutter

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.gctu.unify
      vars:
        APP_ID: com.gctu.unify

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
      cancel_previous_builds: true

    cache:
      cache_paths:
        - $HOME/.pub-cache

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Run flutter analyze
        script: flutter analyze

      - name: Run flutter test
        script: |
          if [ -d "test" ] && [ "$(ls -A test 2>/dev/null)" ]; then
            flutter test
          else
            echo "No tests found — skipping test step"
          fi

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build iOS IPA for TestFlight
        script: |
          flutter build ipa \
            --release \
            --export-options-plist=/Users/builder/export_options.plist \
            --build-name=1.0.0 \
            --build-number=$(($(git rev-list --count HEAD)))

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/ipa/*.plist
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
        beta_groups:
          - Internal Testers
          - External Testers

      email:
        recipients:
          - chrisxie12@example.com
        notify:
          success: true
          failure: true
